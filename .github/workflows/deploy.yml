name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Bust cache only when source files change, not on every push.
          key: nextjs-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'package-lock.json') }}
          restore-keys: nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
